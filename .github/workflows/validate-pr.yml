name: Validate PR

on:
  pull_request:
    branches: [main]

permissions: {}

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Run secret pattern tests
        run: bash tests/test-secret-patterns.sh

      - name: Run Go tests (includes BDD specs)
        run: go test ./... -count=1
