name: Validate PR

on:
  pull_request:
    branches: [main]

permissions: {}

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: go.mod

      - name: Run secret pattern tests
        run: bash tests/test-secret-patterns.sh

      - name: Run Go tests (includes BDD specs)
        run: go test ./... -count=1
