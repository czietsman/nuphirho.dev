name: Validate PR

on:
  pull_request:
    branches: [main]

permissions: {}

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Run secret pattern tests
        run: bash tests/test-secret-patterns.sh

      - name: Run BDD traceability checks
        run: go test ./... -run '^TestBDDTraceability$' -count=1

      - name: Run Go tests (includes BDD specs)
        run: go test ./... -count=1

      - name: Install go-mutesting
        run: go install github.com/avito-tech/go-mutesting/cmd/go-mutesting@v0.0.0-20251226130216-48d0401f00fb

      - name: Run mutation tests
        run: $(go env GOPATH)/bin/go-mutesting --exec-timeout=20 ./internal/frontmatter
