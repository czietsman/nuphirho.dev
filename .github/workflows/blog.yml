name: Deploy Blog to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'posts/**'
      - 'blog/**'
  pull_request:
    paths:
      - 'posts/**'
      - 'blog/**'
  workflow_dispatch:

permissions: {}

concurrency:
  group: blog-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      deployments: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: blog/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: blog

      - name: Build
        run: npm run build
        working-directory: blog

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy .svelte-kit/cloudflare --project-name=nuphirho-blog${{ github.event_name == 'pull_request' && format(' --branch={0}', github.head_ref) || '' }}
          workingDirectory: blog
