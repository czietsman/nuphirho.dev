name: Publish

on:
  push:
    branches: [main]
    paths: ['posts/**']
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      posts:
        description: 'Space-separated post paths (leave empty for all posts)'
        required: false
        default: ''

permissions: {}

jobs:
  publish:
    name: Publish posts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Find changed posts
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            POSTS=$(git diff --name-only --diff-filter=ACM HEAD~1 HEAD -- 'posts/*.md' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.posts }}"
            if [ -n "$INPUT" ]; then
              POSTS=$(echo "$INPUT" | tr ' ' '\n' | jq -R -s -c 'split("\n") | map(select(length > 0))')
            else
              POSTS=$(find posts -name '*.md' | jq -R -s -c 'split("\n") | map(select(length > 0))')
            fi
          else
            # schedule: process all posts, pipeline skips drafts and future-dated
            POSTS=$(find posts -name '*.md' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi
          echo "posts=$POSTS" >> "$GITHUB_OUTPUT"

      - name: Build publish tool
        if: steps.changed.outputs.posts != '[]'
        run: go build -o publish ./cmd/publish/

      - name: Publish posts
        id: publish_step
        if: steps.changed.outputs.posts != '[]'
        continue-on-error: true
        env:
          HASHNODE_TOKEN: ${{ secrets.HASHNODE_TOKEN }}
          HASHNODE_PUBLICATION_ID: ${{ secrets.HASHNODE_PUBLICATION_ID }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: |
          set +e
          FILES=$(echo '${{ steps.changed.outputs.posts }}' | jq -r '.[]')
          ./publish --tags-file tags.json $FILES
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build notification tools
        if: github.event_name == 'schedule'
        run: |
          go build -o notify ./cmd/notify/
          go build -o notify-summary ./cmd/notify-summary/

      - name: Prepare daily notification
        id: notification
        if: github.event_name == 'schedule'
        run: |
          ./notify-summary --posts-dir posts --today "$(date -u +%F)" --publish-exit-code "${{ steps.publish_step.outputs.exit_code }}" > notification.txt
          if [ -s notification.txt ]; then
            echo "has_message=true" >> "$GITHUB_OUTPUT"
            {
              echo 'MESSAGE<<EOF'
              cat notification.txt
              echo 'EOF'
            } >> "$GITHUB_ENV"
          else
            echo "has_message=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send daily notification
        if: github.event_name == 'schedule' && steps.notification.outputs.has_message == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: ./notify "$MESSAGE"

      - name: Fail if publish step failed
        if: steps.publish_step.outputs.exit_code != '' && steps.publish_step.outputs.exit_code != '0'
        run: exit 1
