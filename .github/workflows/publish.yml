name: Publish

on:
  push:
    branches: [main]
    paths: ['posts/**']
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      posts:
        description: 'Space-separated post paths (leave empty for all posts)'
        required: false
        default: ''

permissions: {}

jobs:
  publish:
    name: Publish posts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: go.mod

      - name: Find changed posts
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            POSTS=$(git diff --name-only --diff-filter=ACM HEAD~1 HEAD -- 'posts/*.md' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.posts }}"
            if [ -n "$INPUT" ]; then
              POSTS=$(echo "$INPUT" | tr ' ' '\n' | jq -R -s -c 'split("\n") | map(select(length > 0))')
            else
              POSTS=$(find posts -name '*.md' | jq -R -s -c 'split("\n") | map(select(length > 0))')
            fi
          else
            # schedule: process all posts, pipeline skips drafts and future-dated
            POSTS=$(find posts -name '*.md' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi
          echo "posts=$POSTS" >> "$GITHUB_OUTPUT"

      - name: Build publish tool
        if: steps.changed.outputs.posts != '[]'
        run: go build -o publish ./cmd/publish/

      - name: Publish posts
        if: steps.changed.outputs.posts != '[]'
        env:
          HASHNODE_TOKEN: ${{ secrets.HASHNODE_TOKEN }}
          HASHNODE_PUBLICATION_ID: ${{ secrets.HASHNODE_PUBLICATION_ID }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: |
          FILES=$(echo '${{ steps.changed.outputs.posts }}' | jq -r '.[]')
          ./publish --tags-file tags.json $FILES
