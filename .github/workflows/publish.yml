name: Publish

on:
  push:
    branches: [main]
    paths: ['posts/**']
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      posts:
        description: 'Space-separated post paths (leave empty for all posts)'
        required: false
        default: ''

permissions: {}

jobs:
  publish:
    name: Publish posts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Build publish tool
        run: go build -o publish ./cmd/publish/

      - name: Publish posts
        id: publish_step
        continue-on-error: true
        env:
          HASHNODE_TOKEN: ${{ secrets.HASHNODE_TOKEN }}
          HASHNODE_PUBLICATION_ID: ${{ secrets.HASHNODE_PUBLICATION_ID }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: |
          set +e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.posts }}" ]; then
            ./publish --tags-file tags.json --posts-dir posts ${{ github.event.inputs.posts }} | tee publish-output.txt
          else
            ./publish --tags-file tags.json --posts-dir posts | tee publish-output.txt
          fi
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build notification tools
        if: github.event_name == 'schedule'
        run: |
          go build -o notify ./cmd/notify/
          go build -o notify-summary ./cmd/notify-summary/

      - name: Prepare daily notification
        id: notification
        if: github.event_name == 'schedule'
        run: |
          ./notify-summary --posts-dir posts --today "$(date -u +%F)" --publish-exit-code "${{ steps.publish_step.outputs.exit_code }}" --publish-output-file publish-output.txt > notification.txt
          if [ -s notification.txt ]; then
            echo "has_message=true" >> "$GITHUB_OUTPUT"
            {
              echo 'MESSAGE<<EOF'
              cat notification.txt
              echo 'EOF'
            } >> "$GITHUB_ENV"
          else
            echo "has_message=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send daily notification
        if: github.event_name == 'schedule' && steps.notification.outputs.has_message == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: ./notify "$MESSAGE"

      - name: Fail if publish step failed
        if: steps.publish_step.outputs.exit_code != '' && steps.publish_step.outputs.exit_code != '0'
        run: exit 1
