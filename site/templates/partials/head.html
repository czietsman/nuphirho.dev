{{define "head"}}
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  {{- if .Description}}
  <meta name="description" content="{{.Description}}">
  {{- end}}
  {{- if .Canonical}}
  <link rel="canonical" href="{{.Canonical}}">
  {{- end}}
  {{- if .OGTitle}}
  <meta property="og:title" content="{{.OGTitle}}">
  {{- end}}
  {{- if .OGDescription}}
  <meta property="og:description" content="{{.OGDescription}}">
  {{- end}}
  {{- if .OGURL}}
  <meta property="og:url" content="{{.OGURL}}">
  {{- end}}
  {{- if .OGType}}
  <meta property="og:type" content="{{.OGType}}">
  {{- end}}
  <meta property="og:site_name" content="nuphirho">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital@0;1&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <script src="/js/theme.js"></script>
{{end}}
