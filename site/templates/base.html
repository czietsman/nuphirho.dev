{{define "base" -}}
<!DOCTYPE html>
<html lang="en">
<head>
  {{template "head" .}}
  {{- joinCSS}}
</head>
<body{{if .BodyClass}} class="{{.BodyClass}}"{{end}}>
  {{template "skip-link" .}}
  {{template "nav" .}}
  <main{{if .MainID}} id="{{.MainID}}"{{end}}{{if .MainClass}} class="{{.MainClass}}"{{end}}>
    {{template "content" .}}
  </main>
  {{- if .ShowFooter}}
  {{template "footer" .}}
  {{- end}}
  {{- joinJS}}
</body>
</html>
{{- end}}
